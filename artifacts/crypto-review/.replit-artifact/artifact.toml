kind = "web"
previewPath = "/"
title = "CryptoKiller Review App"
version = "1.0.0"
id = "artifacts/crypto-review"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23178

[services.development]
run = "pnpm --filter @workspace/crypto-review run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/crypto-review", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/crypto-review/dist/server/index.mjs"]

[services.production.run.env]
PORT = "23178"
NODE_ENV = "production"

[services.production.health.startup]
path = "/healthz"

[services.env]
PORT = "23178"
BASE_PATH = "/"
